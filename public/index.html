<script>

let currentUser = null;
let currentPage = 'dashboard';
let fileCache = {};  // fileId -> {sheets}
let editingFile = null;
let editingSheetName = null;

// ===================== API =====================
async function api(method, url, data, isFile = false) {
  const opts = {
    method,
    credentials: 'include',
    headers: isFile ? {} : { 'Content-Type': 'application/json' },
    body: data ? (isFile ? data : JSON.stringify(data)) : undefined,
  };
  const res = await fetch(url, opts);
  if (res.status === 401) { showLogin(); return null; }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/json')) return res.json();
  return { _raw: res, _status: res.status };
}

// ===================== 认证 =====================
async function checkAuth() {
  const me = await api('GET', '/api/auth/me');
  if (me && me.id) {
    currentUser = me;
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('sidebarUsername').textContent = currentUser.username;
  document.getElementById('sidebarRole').textContent = currentUser.role === 'admin' ? '管理员' : '普通用户';
  // 管理员功能
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = currentUser.role === 'admin' ? 'flex' : 'none';
  });
  navigate('dashboard');
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const rememberMe = document.getElementById('rememberMe').checked;
  document.getElementById('loginError').textContent = '';
  if (!username || !password) { document.getElementById('loginError').textContent = '请输入用户名和密码'; return; }

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, rememberMe }),
    credentials: 'include',
  });
  const data = await res.json();
  if (data.success) {
    currentUser = data.user;
    showApp();
  } else {
    document.getElementById('loginError').textContent = data.error || '登录失败';
  }
}

async function doLogout() {
  await api('POST', '/api/auth/logout');
  currentUser = null;
  showLogin();
}

// 回车登录
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ===================== 导航 =====================
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));

  document.getElementById('pageTitle').textContent = titles[page] || page;
  const content = document.getElementById('pageContent');
  content.innerHTML = '<div style="color:#94a3b8;padding:40px;text-align:center;">加载中...</div>';

  const pages = { dashboard: renderDashboard, files: renderFiles, search: renderSearch, materials: renderMaterials, applications: renderApplications, 'workflow': renderWorkflow, 'workflow-config': renderWorkflowConfig, users: renderUsers, departments: renderDepartments, logs: renderLogs, password: renderPassword };
  if (pages[page]) pages[page]();
}

// 获取天气组件
async function getWeatherWidget() {
  try {
    // 使用 ipapi 获取位置，然后获取天气

    const data = await response.json();
    const city = data.city || '北京';
    
    return `
      <div class="weather-widget" id="weatherWidget">
        <div class="weather-city">${escHtml(city)}</div>
        <div class="weather-info">
          <span class="weather-icon">🌤️</span>
          <span class="weather-temp">--°C</span>
        </div>
        <div class="weather-desc">加载中...</div>
      </div>
    `;
  } catch {
    return `
      <div class="weather-widget">
        <div class="weather-city">--</div>
        <div class="weather-info">
          <span class="weather-icon">🌤️</span>
          <span class="weather-temp">--°C</span>
        </div>
        <div class="weather-desc">天气服务暂不可用</div>
      </div>
    `;
  }
}

async function loadNews() {
  const newsList = document.getElementById('newsList');
  if (!newsList) return;
  
  newsList.innerHTML = newsData.map(news => `
    <div class="news-item" onclick="showNewsDetail(${news.id})">
      ${news.hot ? '<span class="news-hot">热</span>' : ''}
      <span class="news-title">${escHtml(news.title)}</span>
      <span class="news-time">${news.time}</span>
    </div>
  `).join('');
}

// 显示新闻详情
function showNewsDetail(newsId) {
  const news = newsData.find(n => n.id === newsId);
  if (!news) return;
  
  const content = `
    <div class="news-detail-content">
      <h3>${escHtml(news.title)}</h3>
      <div class="news-detail-meta">
        <span>📰 ${escHtml(news.source)}</span>
        <span>🕐 ${news.time}</span>
        ${news.hot ? '<span style="color: #dc2626;">🔥 热门</span>' : ''}
      </div>
      <div class="news-detail-body">
        ${news.content.split('\n\n').map(p => `<p>${escHtml(p)}</p>`).join('')}
      </div>
    </div>
  `;
  
  showModal('新闻详情', content, `
    <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
  `);
}

      <textarea id="broadcastContent" rows="6" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;resize:vertical;">${escHtml(currentContent)}</textarea>
    </div>

  `, `
    <button class="btn btn-primary btn-sm" onclick="saveBroadcast()">保存</button>
    <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
  `);
}

async function saveBroadcast() {
  const content = document.getElementById('broadcastContent').value;
  const res = await api('POST', '/api/materials/broadcast', { content });
  if (res && res.success) {
    toast('告示已更新', 'success');
    closeModal();
    renderDashboard();
  } else {
    toast(res?.error || '保存失败', 'error');
  }
}

// 格式化日期
function formatDateCN(date) {
  const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const w = weekdays[date.getDay()];
  return `${y}年${m}月${d}日 星期${w}`;
}

// 格式化相对时间
function formatRelativeTime(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diff = now - date;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  
  if (minutes < 1) return '刚刚';
  if (minutes < 60) return `${minutes}分钟前`;
  if (hours < 24) return `${hours}小时前`;
  if (days < 7) return `${days}天前`;
  return date.toLocaleDateString('zh-CN');
}

// 格式化告示内容
function formatBroadcast(content) {
  if (!content.trim()) return '<p class="empty-text">暂无公告</p>';
  
  const lines = content.split('\n').filter(line => line.trim());
  const icons = ['📢', '📋', '✅', '⚠️', '💡', '🎯'];
  
  return lines.map((line, index) => {
    const icon = icons[index % icons.length];
    // 如果行中包含冒号，分割为标题和内容
    const parts = line.split('：');
    if (parts.length >= 2) {
      const title = parts[0];
      const desc = parts.slice(1).join('：');
      return `
        <div class="broadcast-item">
          <div class="broadcast-item-icon">${icon}</div>
          <div class="broadcast-item-content">
            <div class="broadcast-item-title">${escHtml(title)}</div>
            <div class="broadcast-item-desc">${escHtml(desc)}</div>
          </div>
        </div>
      `;
    }
    return `
      <div class="broadcast-item">
        <div class="broadcast-item-icon">${icon}</div>
        <div class="broadcast-item-content">
          <div class="broadcast-item-desc">${escHtml(line)}</div>
        </div>
      </div>
    `;
  }).join('');
}

// 获取当前步骤名称
function getStepName(instance) {
  if (instance.status === 'approved') return '已通过';
  if (instance.status === 'rejected') return '已拒绝';
  const step = instance.steps[instance.currentStepIndex];
  return step ? `待${step.name}` : '处理中';
}

// ===================== 文件管理 =====================
async function renderFiles() {
  const files = await api('GET', '/api/excel/files') || [];
  const el = document.getElementById('pageContent');
  let uploadHtml = '';
  if (currentUser.role === 'admin') {
    uploadHtml = `
    <div class="card">
      <div class="card-title">📤 上传 Excel 文件</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <div style="font-size:40px">📊</div>
        <p>点击或拖拽 .xlsx / .xls 文件到此处上传</p>
        <p style="font-size:12px;margin-top:4px">最大 50MB</p>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(this)">
    </div>`;
  }
  el.innerHTML = uploadHtml + `
    <div class="card">
      <div class="card-title">📁 文件列表 <span style="font-size:13px;color:#94a3b8;">(共 ${files.length} 个)</span></div>
      <div id="fileListContainer">
        ${files.length === 0 ? '<p style="color:#94a3b8;text-align:center;padding:20px 0;">暂无文件，请先上传</p>' : files.map(renderFileItem).join('')}
      </div>
    </div>`;
}

function renderFileItem(f) {
  const size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : (f.size/1024).toFixed(0)+'KB';
  const date = new Date(f.uploadedAt).toLocaleString('zh-CN');
  const adminBtns = currentUser.role === 'admin' ? `
    <button class="btn btn-sm btn-secondary" onclick="renameFile('${f.id}','${escHtml(f.displayName)}')">重命名</button>
    <button class="btn btn-sm btn-danger" onclick="deleteFile('${f.id}','${escHtml(f.displayName)}')">删除</button>
  ` : '';
  return `
  <div class="file-card" id="fc-${f.id}">
    <div class="file-icon">📊</div>
    <div class="file-info">
      <div class="file-name">${escHtml(f.displayName)}</div>
      <div class="file-meta">上传者: ${escHtml(f.uploadedBy)} · ${date} · ${size}</div>
    </div>
    <div class="file-actions">
      <button class="btn btn-sm btn-primary" onclick="viewFile('${f.id}')">查看</button>
      ${currentUser.role === 'admin' ? `<button class="btn btn-sm btn-secondary" onclick="editFile('${f.id}')">编辑</button>` : ''}
      <button class="btn btn-sm btn-secondary" onclick="exportFile('${f.id}','xlsx')">导出xlsx</button>
      <button class="btn btn-sm btn-secondary" onclick="exportFile('${f.id}','csv')">导出csv</button>
      ${adminBtns}
    </div>
  </div>`;
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
}

function handleFileSelect(input) {
  if (input.files[0]) uploadFile(input.files[0]);
}

async function uploadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx','xls'].includes(ext)) { toast('只支持 .xlsx / .xls 文件', 'error'); return; }

  const displayName = prompt('请输入文件显示名称（留空则使用原文件名）:', file.name.replace(/\.[^.]+$/,''));
  if (displayName === null) return;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('displayName', displayName || file.name);

  toast('上传中...');
  const res = await api('POST', '/api/excel/upload', fd, true);
  if (res && res.success) {
    toast('上传成功', 'success');
    renderFiles();
  } else {
    toast(res?.error || '上传失败', 'error');
  }
}

async function deleteFile(id, name) {
  if (!confirm(`确定删除文件「${name}」？此操作不可撤销！`)) return;
  const res = await api('DELETE', `/api/excel/${id}`);
  if (res && res.success) { toast('删除成功', 'success'); renderFiles(); }
  else toast(res?.error || '删除失败', 'error');
}

async function renameFile(id, oldName) {
  const newName = prompt('请输入新名称:', oldName);
  if (!newName || newName.trim() === oldName) return;
  const res = await api('PATCH', `/api/excel/rename/${id}`, { displayName: newName.trim() });
  if (res && res.success) { toast('重命名成功', 'success'); renderFiles(); }
  else toast(res?.error || '重命名失败', 'error');
}

function exportFile(id, format) {
  window.open(`/api/excel/export/${id}?format=${format}`, '_blank');
}

// ===================== 查看/编辑文件 =====================
async function viewFile(id) {
  const data = await api('GET', `/api/excel/data/${id}`);
  if (!data || !data.sheets) { toast('加载失败', 'error'); return; }
  fileCache[id] = data;
  showDataModal(id, data, false);
}

async function editFile(id) {
  const data = await api('GET', `/api/excel/data/${id}`);
  if (!data || !data.sheets) { toast('加载失败', 'error'); return; }
  fileCache[id] = JSON.parse(JSON.stringify(data)); // deep copy
  editingFile = id;
  showDataModal(id, data, true);
}

function showDataModal(id, data, editable) {
  const sheetNames = Object.keys(data.sheets);
  if (!sheetNames.length) { toast('文件无数据', 'error'); return; }

  editingSheetName = sheetNames[0];

  const tabHtml = sheetNames.map((s,i) =>
    `<button class="tab-btn ${i===0?'active':''}" onclick="switchSheet('${id}',this,'${escHtml(s)}','${editable}')">${escHtml(s)}</button>`
  ).join('');

  const body = `
    <div id="dataTabBtns">${tabHtml}</div>
    <div id="sheetTableWrap" style="margin-top:12px;max-height:60vh;overflow:auto;">
      ${buildSheetTable(data.sheets[sheetNames[0]], editable)}
    </div>`;

  const actions = [
    editable ? `<button class="btn btn-primary btn-sm" onclick="saveFileEdit('${id}')">💾 保存</button>` : '',
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">关闭</button>`,
  ].filter(Boolean).join('');

  showModal(data.fileName + (editable ? ' [编辑模式]' : ''), body, actions);
}

function switchSheet(id, btn, sheetName, editable) {
  editingSheetName = sheetName;
  document.querySelectorAll('#dataTabBtns .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const data = fileCache[id];
  document.getElementById('sheetTableWrap').innerHTML = buildSheetTable(data.sheets[sheetName], editable === 'true');
}

function buildSheetTable(rows, editable) {
  if (!rows || !rows.length) return '<p style="color:#94a3b8;padding:20px;text-align:center;">此工作表无数据</p>';
  const headers = Object.keys(rows[0]);
  const ths = headers.map(h => `<th>${escHtml(String(h))}</th>`).join('');
  const trs = rows.map((row, ri) => {
    const tds = headers.map((h, ci) => {
      const v = row[h] ?? '';
      if (editable) {
        return `<td><input type="text" value="${escHtml(String(v))}" class="edit-cell" style="border:none;background:transparent;width:100%;min-width:80px;font-size:13px;padding:2px 4px;"
          onchange="updateCell(${ri},'${escHtml(h)}',this.value)"></td>`;
      }
      return `<td>${escHtml(String(v))}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  let addRowBtn = editable ? `
    <div style="padding:10px 0">
      <button class="btn btn-sm btn-secondary" onclick="addRow()">+ 添加行</button>
    </div>` : '';

  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>${addRowBtn}`;
}

function updateCell(rowIdx, header, value) {
  if (!editingFile || !editingSheetName) return;
  const data = fileCache[editingFile];
  if (data && data.sheets[editingSheetName]) {
    data.sheets[editingSheetName][rowIdx][header] = value;
  }
}

function addRow() {
  if (!editingFile || !editingSheetName) return;
  const data = fileCache[editingFile];
  const rows = data.sheets[editingSheetName];
  if (!rows.length) return;
  const emptyRow = {};
  Object.keys(rows[0]).forEach(k => emptyRow[k] = '');
  rows.push(emptyRow);
  document.getElementById('sheetTableWrap').innerHTML = buildSheetTable(rows, true);
}

async function saveFileEdit(id) {
  const data = fileCache[id];
  const res = await api('PUT', `/api/excel/data/${id}`, { sheets: data.sheets });
  if (res && res.success) { toast('保存成功', 'success'); closeModal(); }
  else toast(res?.error || '保存失败', 'error');
}

// ===================== 搜索 =====================
async function renderSearch() {
  const files = await api('GET', '/api/excel/files') || [];
  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div class="card">
      <div class="card-title">🔍 数据查询</div>
      <div class="search-bar">
        <input type="text" id="searchKeyword" placeholder="输入关键词搜索..." onkeydown="if(event.key==='Enter')doSearch()">
        <select id="searchFile">
          <option value="">全部文件</option>
          ${files.map(f => `<option value="${f.id}">${escHtml(f.displayName)}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="doSearch()">搜索</button>
      </div>
      <div id="searchResults"></div>
    </div>`;
}

async function doSearch() {
  const kw = document.getElementById('searchKeyword').value.trim();
  const fileId = document.getElementById('searchFile').value;
  if (!kw) { toast('请输入关键词', 'error'); return; }
  document.getElementById('searchResults').innerHTML = '<p style="color:#94a3b8;">搜索中...</p>';
  const res = await api('GET', `/api/excel/search?keyword=${encodeURIComponent(kw)}${fileId?'&fileId='+fileId:''}`);
  if (!res) return;
  const el = document.getElementById('searchResults');
  if (!res.results || !res.results.length) {
    el.innerHTML = '<p style="color:#94a3b8;padding:20px;text-align:center;">未找到匹配结果</p>'; return;
  }
  const rows = res.results.map(r => {
    const cells = Object.entries(r.row).map(([k,v]) => `<td><b>${escHtml(String(k))}</b>: ${escHtml(String(v))}</td>`).join('');
    return `<tr><td><span class="badge badge-success">${escHtml(r.fileName)}</span> / ${escHtml(r.sheet)}</td>${cells}</tr>`;
  }).join('');
  el.innerHTML = `<p style="color:#64748b;margin-bottom:10px">共找到 <b>${res.total}</b> 条结果</p>
    <div class="table-wrap"><table><tbody>${rows}</tbody></table></div>`;
}

function toggleSelectAllUsers() {
  const checked = document.getElementById('selectAllUsers').checked;
  document.querySelectorAll('.user-checkbox:not([disabled])').forEach(cb => cb.checked = checked);
}

function getSelectedUserIds() {
  return Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => cb.value);
}

function showAddUser() {
  const deptOptions = departmentsData.map(d => `<option value="${d.id}">${escHtml(d.name)}</option>`).join('');
  
  showModal('添加用户', `
    <div class="form-group"><label>用户名</label><input type="text" id="nu_name" placeholder="用户名"></div>
    <div class="form-group"><label>密码（6~50位）</label><input type="password" id="nu_pass" placeholder="密码"></div>
    <div class="form-group"><label>角色</label>
      <select id="nu_role" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
        <option value="user">普通用户</option>
        <option value="admin">管理员</option>
      </select>
    </div>
    <div class="form-group"><label>部门</label>
      <select id="nu_dept" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
        <option value="">-- 请选择部门 --</option>
        ${deptOptions}
      </select>
    </div>

    `<button class="btn btn-primary btn-sm" onclick="doAddUser()">确定添加</button>
     <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>`
  );
}

async function doAddUser() {
  const username = document.getElementById('nu_name').value.trim();
  const password = document.getElementById('nu_pass').value;
  const role = document.getElementById('nu_role').value;
  const departmentId = document.getElementById('nu_dept').value;
  document.getElementById('nuError').textContent = '';
  if (!username || !password) { document.getElementById('nuError').textContent = '请填写完整'; return; }
  const res = await api('POST', '/api/users', { username, password, role, departmentId });
  if (res && res.success) { toast('添加成功', 'success'); closeModal(); renderUsers(); }
  else document.getElementById('nuError').textContent = res?.error || '添加失败';
}

function editUser(id, username, role, departmentId) {
  const deptOptions = departmentsData.map(d => 
    `<option value="${d.id}" ${d.id === departmentId ? 'selected' : ''}>${escHtml(d.name)}</option>`
  ).join('');
  
  showModal('编辑用户', `
    <div class="form-group"><label>用户名</label><input type="text" value="${escHtml(username)}" disabled style="background: #f5f5f5;"></div>
    <div class="form-group"><label>角色</label>
      <select id="edit_role" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
        <option value="user" ${role === 'user' ? 'selected' : ''}>普通用户</option>
        <option value="admin" ${role === 'admin' ? 'selected' : ''}>管理员</option>
      </select>
    </div>
    <div class="form-group"><label>部门</label>
      <select id="edit_dept" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;">
        <option value="">-- 请选择部门 --</option>
        ${deptOptions}
      </select>
    </div>
    <div class="error-msg" id="editError"></div>`,
    `<button class="btn btn-primary btn-sm" onclick="doEditUser('${id}')">保存</button>
     <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>`
  );
}

async function doEditUser(id) {
  const role = document.getElementById('edit_role').value;
  const departmentId = document.getElementById('edit_dept').value;
  document.getElementById('editError').textContent = '';
  
  const res = await api('PUT', `/api/users/${id}`, { role, departmentId });
  if (res && res.success) { toast('更新成功', 'success'); closeModal(); renderUsers(); }
  else document.getElementById('editError').textContent = res?.error || '更新失败';
}

async function deleteUser(id, name) {
  if (!confirm(`确定删除用户「${name}」？`)) return;
  const res = await api('DELETE', `/api/users/${id}`);
  if (res && res.success) { toast('删除成功', 'success'); renderUsers(); }
  else toast(res?.error || '删除失败', 'error');
}

// 管理员重置用户密码
function resetUserPassword(id, username) {
  showModal('重置密码', `
    <div class="form-group">
      <label>用户名</label>
      <input type="text" value="${escHtml(username)}" disabled style="background: #f5f5f5;">
    </div>
    <div class="form-group">
      <label>新密码（6~50位）</label>
      <input type="password" id="resetPass" placeholder="请输入新密码">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" id="resetPassConfirm" placeholder="请再次输入新密码">
    </div>
    <div class="error-msg" id="resetPassError"></div>`,
    `<button class="btn btn-primary btn-sm" onclick="doResetPassword('${id}')">确认重置</button>
     <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>`
  );
}

async function doResetPassword(id) {
  const password = document.getElementById('resetPass').value;
  const confirm = document.getElementById('resetPassConfirm').value;
  document.getElementById('resetPassError').textContent = '';
  
  if (!password || !confirm) { document.getElementById('resetPassError').textContent = '请填写完整'; return; }
  if (password !== confirm) { document.getElementById('resetPassError').textContent = '两次输入的密码不一致'; return; }
  if (password.length < 6) { document.getElementById('resetPassError').textContent = '密码至少6位'; return; }
  
  const res = await api('PUT', `/api/users/${id}/password`, { password });
  if (res && res.success) {
    toast('密码重置成功', 'success');
    closeModal();
  } else {
    document.getElementById('resetPassError').textContent = res?.error || '重置失败';
  }
}

function showBatchDelete() {
  const ids = getSelectedUserIds();
  if (ids.length === 0) { toast('请先选择要删除的用户', 'error'); return; }
  if (!confirm(`确定删除选中的 ${ids.length} 个用户吗？`)) return;
  
  api('POST', '/api/users/batch-delete', { ids }).then(res => {
    if (res && res.success) {
      toast(`成功删除 ${res.deleted} 个用户`, 'success');
      renderUsers();
    } else {
      toast(res?.error || '删除失败', 'error');
    }
  });
}

async function doImportUsers() {
  const fileInput = document.getElementById('importFile');
  if (!fileInput.files[0]) {
    document.getElementById('importError').textContent = '请选择文件';
    return;
  }
  
  const formData = new FormData();

  const res = await fetch('/api/users/import', {

    body: formData
  });

async function doChangePass() {
  const old = document.getElementById('pw_old').value;
  const nw = document.getElementById('pw_new').value;
  const confirm = document.getElementById('pw_confirm').value;
  document.getElementById('pwError').textContent = '';
  if (!old || !nw || !confirm) { document.getElementById('pwError').textContent = '请填写所有字段'; return; }
  if (nw !== confirm) { document.getElementById('pwError').textContent = '两次输入的密码不一致'; return; }
  if (nw.length < 6) { document.getElementById('pwError').textContent = '密码至少6位'; return; }

  const res = await api('POST', '/api/auth/change-password', { oldPassword: old, newPassword: nw });
  if (res && res.success) {
    toast('密码修改成功，请重新登录', 'success');
    setTimeout(() => { currentUser = null; showLogin(); }, 1500);
  } else {
    document.getElementById('pwError').textContent = res?.error || '修改失败';

}

// ===================== Toast =====================
function toast(msg, type = '') {
  const container = document.getElementById('toast');
  const div = document.createElement('div');
  div.className = 'toast-item ' + type;
  div.textContent = msg;
  container.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// ===================== Utils =====================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onMaterialChange() {
  const select = document.getElementById('materialSelect');
  const option = select.options[select.selectedIndex];
  if (!option.value) {
    document.getElementById('materialSpec').value = '';
    document.getElementById('materialPrice').value = '';
    document.getElementById('materialTotal').value = '';
    return;
  }
  document.getElementById('materialSpec').value = option.dataset.spec || '';
  document.getElementById('materialPrice').value = '¥' + parseFloat(option.dataset.price).toFixed(2);
  calculateTotal();
}

function calculateTotal() {
  const select = document.getElementById('materialSelect');
  const option = select.options[select.selectedIndex];
  const price = parseFloat(option.dataset.price) || 0;
  const qty = parseInt(document.getElementById('materialQty').value) || 0;
  const total = price * qty;
  document.getElementById('materialTotal').value = '¥' + total.toFixed(2);
}

async function submitApplication() {
  const materialId = document.getElementById('materialSelect').value;
  const quantity = document.getElementById('materialQty').value;
  const applicantName = document.getElementById('applicantName').value;
  const remark = document.getElementById('materialRemark').value;
  
  if (!materialId) { toast('请选择物资', 'error'); return; }
  if (!quantity || quantity < 1) { toast('请输入有效数量', 'error'); return; }
  if (!applicantName || applicantName.trim().length === 0) { toast('请填写申领人', 'error'); return; }
  
  const res = await api('POST', '/api/materials/apply', { materialId, quantity, applicantName: applicantName.trim(), remark });
  if (res && res.success) {
    toast('申领提交成功', 'success');
    renderMaterials();
  } else {
    toast(res?.error || '提交失败', 'error');
  }
}

async function renderApplicationsList() {
  const res = await api('GET', '/api/materials/my-applications');
  const apps = res?.applications || [];
  
  if (apps.length === 0) {
    return '<div class="card" style="margin-top: 20px;"><div class="card-title">📋 申领记录</div><p style="color: #999; padding: 20px;">暂无申领记录</p></div>';
  }
  
  let html = `
    <div class="card" style="margin-top: 20px;">
      <div class="card-title">📋 申领记录（${apps.length} 条）</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>物资</th>
              <th>规格</th>
              <th>单价</th>
              <th>数量</th>
              <th>金额</th>
              <th>状态</th>
              ${currentUser?.role === 'admin' ? '<th>申领人</th><th>申请人账号</th><th>部门</th><th>操作</th>' : '<th>申领人</th><th>备注</th>'}
            </tr>
          </thead>
          <tbody>`;
  
  apps.forEach(app => {
    const statusClass = app.status === 'approved' ? 'badge-success' : app.status === 'rejected' ? 'badge-danger' : 'badge-warning';
    const statusText = app.status === 'approved' ? '已通过' : app.status === 'rejected' ? '已拒绝' : '待审批';
    
    html += `<tr ${app.isReadOnly ? 'style="background: #f9f9f9;"' : ''}>
      <td>${new Date(app.createdAt).toLocaleDateString('zh-CN')}</td>
      <td>${escHtml(app.materialName)}</td>
      <td>${escHtml(app.materialSpec || '-')}</td>
      <td>¥${(app.materialPrice || 0).toFixed(2)}</td>
      <td>${app.quantity}</td>
      <td style="font-weight: bold; color: #2e7d32;">¥${(app.totalAmount || 0).toFixed(2)}</td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>`;
    
    if (currentUser?.role === 'admin') {
      html += `<td>${escHtml(app.applicantName || app.username || '-')}</td>
        <td>${escHtml(app.username)}</td>
        <td>${escHtml(app.departmentName)}</td>
        <td>
          ${app.status === 'pending' ? `
            <button class="btn btn-xs btn-success" onclick="updateAppStatus('${app.id}', 'approved')">通过</button>
            <button class="btn btn-xs btn-danger" onclick="updateAppStatus('${app.id}', 'rejected')">拒绝</button>
          ` : '-'}
          <button class="btn btn-xs btn-secondary" onclick="deleteApplication('${app.id}')">删除</button>
        </td>`;
    } else {
      html += `<td>${escHtml(app.applicantName || app.username || '-')}</td>
        <td>${escHtml(app.remark || '-')}</td>`;
    }
    
    html += '</tr>';
  });
  
  html += '</tbody></table></div></div>';
  return html;
}

function renderApplicationsRows(apps) {
  if (apps.length === 0) {

  }
  
  return apps.map(app => {
    const statusClass = app.status === 'approved' ? 'badge-success' : app.status === 'rejected' ? 'badge-fail' : 'badge-warning';
    const statusText = app.status === 'approved' ? '已通过' : app.status === 'rejected' ? '已拒绝' : '待审批';
    
    return `<tr data-id="${app.id}">
      <td>${new Date(app.createdAt).toLocaleString('zh-CN')}</td>
      <td>${escHtml(app.applicantName || '-')}</td>
      <td>${escHtml(app.username)}</td>
      <td>${escHtml(app.departmentName)}</td>
      <td>${escHtml(app.materialName)}</td>
      <td>${escHtml(app.materialSpec || '-')}</td>
      <td>¥${(app.materialPrice || 0).toFixed(2)}</td>
      <td>${app.quantity}</td>
      <td style="font-weight: bold;">¥${(app.totalAmount || 0).toFixed(2)}</td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>
      <td>${escHtml(app.remark || '-')}</td>
      <td>
        ${app.status === 'pending' ? `
          <button class="btn btn-xs" style="background: #10b981; color: white;" onclick="updateApplicationStatus('${app.id}', 'approved')">通过</button>
          <button class="btn btn-xs" style="background: #ef4444; color: white;" onclick="updateApplicationStatus('${app.id}', 'rejected')">拒绝</button>
        ` : `<button class="btn btn-xs btn-secondary" onclick="editApplication('${app.id}')">编辑</button>`}
        <button class="btn btn-xs btn-secondary" onclick="deleteApplicationRecord('${app.id}')">删除</button>
      </td>
    </tr>`;
  }).join('');
}

function filterApplications() {
  const keyword = document.getElementById('appSearchKeyword').value.toLowerCase();
  const status = document.getElementById('appSearchStatus').value;
  const deptId = document.getElementById('appSearchDept').value;
  
  const rows = document.querySelectorAll('#applicationsTableBody tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    const rowStatus = row.querySelector('.badge')?.textContent;
    const matchesKeyword = !keyword || text.includes(keyword);
    const matchesStatus = !status || 
      (status === 'pending' && rowStatus === '待审批') ||
      (status === 'approved' && rowStatus === '已通过') ||
      (status === 'rejected' && rowStatus === '已拒绝');
    
    row.style.display = (matchesKeyword && matchesStatus) ? '' : 'none';
  });
}

function clearAppFilter() {
  document.getElementById('appSearchKeyword').value = '';

function exportApplications() {
  const table = document.getElementById('applicationsTable');
  if (!table) { toast('暂无数据可导出', 'error'); return; }
  
  // 构建CSV数据
  const rows = [];
  rows.push(['申请时间', '申请人', '部门', '物资名称', '规格', '单价', '数量', '金额', '状态', '备注'].join(','));
  
  table.querySelectorAll('tbody tr').forEach(row => {
    if (row.style.display === 'none') return;
    const cells = row.querySelectorAll('td');
    if (cells.length < 10) return;
    
    const rowData = [
      cells[0].textContent,
      cells[1].textContent,
      cells[2].textContent,
      cells[3].textContent,
      cells[4].textContent,
      cells[5].textContent.replace('¥', ''),
      cells[6].textContent,
      cells[7].textContent.replace('¥', ''),
      cells[8].textContent.trim(),
      cells[9].textContent
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    
    rows.push(rowData);
  });
  
  const csv = '\uFEFF' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `申领记录_${new Date().toISOString().slice(0, 10)}.csv`;
  link.click();
  
  toast('导出成功', 'success');
}

              const statusInfo = getWorkflowStatusInfo(app);

                <td>${new Date(app.createdAt).toLocaleString('zh-CN')}</td>

                  ${app.status === 'pending' ? `<button class="btn btn-xs btn-danger" onclick="withdrawMyApplication('${app.id}')">撤回</button>` : ''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}

  `;
}

function getWorkflowIcon(category) {
  const icons = {
    leave: '🏖️',
    expense: '💰',
    purchase: '🛒',
    general: '📄',
    overtime: '⏰',
    business: '✈️'
  };
  return icons[category] || '📄';
}

function getWorkflowStatusInfo(app) {
  switch (app.status) {
    case 'pending':
      const step = app.steps[app.currentStepIndex];
      return { class: 'badge-warning', text: `待${step?.name || '审批'}` };
    case 'approved':
      return { class: 'badge-success', text: '已通过' };
    case 'rejected':
      return { class: 'badge-fail', text: '已拒绝' };
    case 'withdrawn':
      return { class: 'badge-secondary', text: '已撤回' };
    default:
      return { class: 'badge-secondary', text: app.status };
  }
}

function startApplication(workflowId, workflowName) {
  showModal(`发起申请 - ${escHtml(workflowName)}`, `
    <div class="form-group">
      <label>申请标题 <span style="color: #dc2626;">*</span></label>
      <input type="text" id="appTitle" placeholder="请输入申请标题，如：请假申请-张三">
    </div>
    <div class="form-group">
      <label>申请内容</label>
      <textarea id="appContent" rows="4" placeholder="请详细描述您的申请内容..."></textarea>
    </div>
    <div class="form-group">
      <label>备注信息</label>
      <input type="text" id="appRemark" placeholder="可选：填写其他需要说明的信息">
    </div>
    <div id="appError" style="color: #dc2626; font-size: 13px;"></div>
  `, `
    <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
    <button class="btn btn-primary btn-sm" onclick="submitWorkflowApplication('${workflowId}')">提交申请</button>
  `);
}

async function submitWorkflowApplication(workflowId) {
  const title = document.getElementById('appTitle').value.trim();
  const content = document.getElementById('appContent').value.trim();
  const remark = document.getElementById('appRemark').value.trim();
  
  if (!title) {
    document.getElementById('appError').textContent = '请输入申请标题';
    return;
  }
  
  const res = await api('POST', '/api/workflow/applications', {
    workflowId,
    title,
    content,
    formData: { remark }
  });
  
  if (res && res.success) {
    toast('申请提交成功', 'success');
    closeModal();
    renderWorkflow();
  } else {
    document.getElementById('appError').textContent = res?.error || '提交失败';
  }
}

async function approveApplication(id) {
  const comment = prompt('请输入审批意见（可选）：');
  if (comment === null) return;
  
  const res = await api('POST', `/api/workflow/instances/${id}/approve`, { comment });
  if (res && res.success) {
    toast('审批通过', 'success');
    renderWorkflow();
  } else {
    toast(res?.error || '审批失败', 'error');
  }
}

async function rejectApplication(id) {
  const comment = prompt('请输入拒绝原因（必填）：');
  if (comment === null) return;
  if (!comment.trim()) {
    toast('请输入拒绝原因', 'error');
    return;
  }
  
  const res = await api('POST', `/api/workflow/instances/${id}/reject`, { comment });
  if (res && res.success) {
    toast('已拒绝该申请', 'success');
    renderWorkflow();
  } else {
    toast(res?.error || '操作失败', 'error');
  }
}

async function withdrawMyApplication(id) {
  if (!confirm('确定撤回此申请吗？')) return;
  
  const res = await api('POST', `/api/workflow/instances/${id}/withdraw`);
  if (res && res.success) {
    toast('申请已撤回', 'success');
    renderWorkflow();
  } else {
    toast(res?.error || '撤回失败', 'error');
  }
}

async function viewApplicationDetail(id) {
  const res = await api('GET', '/api/workflow/my-applications');
  const allApps = res || [];
  const app = allApps.find(a => a.id === id);
  
  if (!app) {
    // 可能是待审批的
    const pendingRes = await api('GET', '/api/workflow/pending-approvals');
    const pending = pendingRes || [];
    const pendingApp = pending.find(a => a.id === id);
    if (!pendingApp) {
      toast('申请不存在', 'error');
      return;
    }
    showApplicationDetail(pendingApp);
    return;
  }
  
  showApplicationDetail(app);
}

function showApplicationDetail(app) {
  const stepsHtml = app.steps.map((step, idx) => {
    let statusIcon = '⏳';
    let statusText = '待处理';
    let statusClass = 'step-waiting';
    
    if (step.status === 'approved') {
      statusIcon = '✅';
      statusText = `已通过 ${step.approvedByName ? '· ' + step.approvedByName : ''}`;
      statusClass = 'step-approved';
    } else if (step.status === 'rejected') {
      statusIcon = '❌';
      statusText = `已拒绝 ${step.rejectedByName ? '· ' + step.rejectedByName : ''}`;
      statusClass = 'step-rejected';
    } else if (step.status === 'pending') {
      statusIcon = '🔄';
      statusText = '审批中';
      statusClass = 'step-pending';
    }
    
    return `
      <div class="detail-step ${statusClass}">
        <div class="step-index">${idx + 1}</div>
        <div class="step-info">
          <div class="step-name">${escHtml(step.name)}</div>
          <div class="step-status">${statusIcon} ${statusText}</div>
          ${step.comment ? `<div class="step-comment">💬 ${escHtml(step.comment)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  
  showModal('申请详情', `
    <div class="app-detail">
      <div class="detail-section">
        <div class="detail-label">申请标题</div>
        <div class="detail-value">${escHtml(app.title)}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">流程类型</div>
        <div class="detail-value">${escHtml(app.workflowName)}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">申请内容</div>
        <div class="detail-value detail-content">${escHtml(app.content || '无')}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">审批流程</div>
        <div class="detail-steps">${stepsHtml}</div>
      </div>
      <div class="detail-meta">
        提交时间：${new Date(app.createdAt).toLocaleString('zh-CN')}
        ${app.completedAt ? ' · 完成时间：' + new Date(app.completedAt).toLocaleString('zh-CN') : ''}
      </div>
    </div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>`);
}

      </div>

      </div>

        <label>流程类型</label>
        <select id="wfCategory">
          <option value="general" ${workflow?.category === 'general' ? 'selected' : ''}>通用审批</option>
          <option value="leave" ${workflow?.category === 'leave' ? 'selected' : ''}>请假申请</option>
          <option value="expense" ${workflow?.category === 'expense' ? 'selected' : ''}>费用报销</option>
          <option value="purchase" ${workflow?.category === 'purchase' ? 'selected' : ''}>采购申请</option>
          <option value="overtime" ${workflow?.category === 'overtime' ? 'selected' : ''}>加班申请</option>
          <option value="business" ${workflow?.category === 'business' ? 'selected' : ''}>出差申请</option>

      </div>
      <div class="form-group">
        <label>审批步骤 <span style="color: #dc2626;">*</span></label>

          ${stepsHtml || '<p class="empty-text" style="padding: 16px;">暂无步骤，请点击下方按钮添加</p>'}

function addStep() {
  workflowSteps.push({
    name: '',
    approvers: [],
    approverType: 'user'
  });
  renderWorkflowStepsInModal();
}

function removeStep(index) {
  workflowSteps.splice(index, 1);
  renderWorkflowStepsInModal();
}

async function renderWorkflowStepsInModal() {
  const res = await api('GET', '/api/workflow/approvers');
  const users = res?.users || [];
  
  const stepsHtml = workflowSteps.map((step, idx) => `
    <div class="step-config-item">
      <div class="step-config-header">
        <span class="step-config-num">步骤 ${idx + 1}</span>
        <button class="btn btn-xs btn-danger" onclick="removeStep(${idx})">删除</button>
      </div>
      <div class="step-config-body">
        <div class="form-group">
          <label>步骤名称</label>
          <input type="text" id="stepName_${idx}" value="${escHtml(step.name)}" placeholder="如：部门经理审批">
        </div>
        <div class="form-group">
          <label>审批人</label>
          <select id="stepApprovers_${idx}" multiple style="height: 80px;">
            ${users.map(u => `<option value="${u.id}" ${step.approvers.includes(u.id) ? 'selected' : ''}>${escHtml(u.username)}</option>`).join('')}
          </select>
          <p class="form-hint">按住 Ctrl 可多选</p>

}

async function saveWorkflow(id) {
  const name = document.getElementById('wfName').value.trim();
  const category = document.getElementById('wfCategory').value;
  const description = document.getElementById('wfDesc').value.trim();
  
  if (!name) {
    document.getElementById('wfError').textContent = '请输入流程名称';
    return;
  }
  
  // 收集步骤数据
  const steps = [];
  for (let i = 0; i < workflowSteps.length; i++) {
    const stepName = document.getElementById(`stepName_${i}`)?.value.trim();
    const approversSelect = document.getElementById(`stepApprovers_${i}`);
    const approvers = approversSelect ? Array.from(approversSelect.selectedOptions).map(o => o.value) : [];
    
    if (!stepName) {
      document.getElementById('wfError').textContent = `步骤 ${i + 1} 名称不能为空`;
      return;
    }
    if (approvers.length === 0) {
      document.getElementById('wfError').textContent = `步骤 ${i + 1} 至少需要选择1个审批人`;
      return;
    }
    
    steps.push({
      name: stepName,
      approvers,
      approverType: 'user'
    });
  }
  
  if (steps.length === 0) {
    document.getElementById('wfError').textContent = '至少需要添加1个审批步骤';
    return;
  }
  
  const data = { name, category, description, steps };
  
  const res = id 
    ? await api('PUT', `/api/workflow/definitions/${id}`, data)
    : await api('POST', '/api/workflow/definitions', data);
  
  if (res && res.success) {
    toast(id ? '流程更新成功' : '流程创建成功', 'success');
    closeModal();
    renderWorkflowConfig();
  } else {
    document.getElementById('wfError').textContent = res?.error || '保存失败';
  }
}

async function toggleWorkflow(id, enable) {
  const res = await api('PUT', `/api/workflow/definitions/${id}`, { enabled: enable });
  if (res && res.success) {
    toast(enable ? '流程已启用' : '流程已停用', 'success');
    renderWorkflowConfig();
  } else {
    toast(res?.error || '操作失败', 'error');
  }
}

async function deleteWorkflowConfig(id, name) {
  if (!confirm(`确定删除审批流程「${name}」吗？\n注意：已提交的申请不受影响，但无法发起新的申请。`)) return;
  
  const res = await api('DELETE', `/api/workflow/definitions/${id}`);
  if (res && res.success) {
    toast('流程已删除', 'success');
    renderWorkflowConfig();
  } else {
    toast(res?.error || '删除失败', 'error');
  }
}

async function deleteWorkflowInstance(id) {
  if (!confirm('确定删除此审批实例吗？此操作不可撤销。')) return;
  
  const res = await api('DELETE', `/api/workflow/instances/${id}`);
  if (res && res.success) {
    toast('已删除', 'success');
    loadAllWorkflowInstances();
  } else {
    toast(res?.error || '删除失败', 'error');
  }
}
